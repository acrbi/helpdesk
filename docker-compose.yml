version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       helpdesk_pro
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + sessions) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: helpdesk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:      production
      PORT:          4000
      FRONTEND_URL:  http://localhost:3000
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       helpdesk_pro
      DB_USER:       postgres
      DB_PASSWORD:   ${DB_PASSWORD:-postgres}
      JWT_SECRET:    ${JWT_SECRET:-change_this_secret}
      JWT_REFRESH:   ${JWT_REFRESH:-change_this_refresh}
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      REDIS_PASS:    ${REDIS_PASSWORD:-redis123}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api/v1
    container_name: helpdesk_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: helpdesk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
