upstream backend  { server backend:4000; }
upstream frontend { server frontend:80;  }

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    location /api/    { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /socket.io/ { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /health  { proxy_pass http://backend; }
    location /        { proxy_pass http://frontend; proxy_http_version 1.1; proxy_set_header Host $host; }
}
